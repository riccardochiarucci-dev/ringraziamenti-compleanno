<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pulsante Troll</title>

<style>

body{
font-family: Arial;
background:#121212;
color:white;
text-align:center;
height:100vh;
overflow:hidden;
}

h1{
margin-top:40px;
}

button{
position:absolute;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff3b3b;
color:white;
cursor:pointer;
}

#msg{
margin-top:200px;
font-size:40px;
font-weight:bold;
color:#00ff9d;
}

#counter{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<h1>Premi il pulsante se ci riesci 😈</h1>

<button id="btn">Premimi</button>

<div id="msg"></div>
<div id="counter">Tentativi: 0</div>

<audio id="trollSound" src="https://www.myinstants.com/media/sounds/vine-boom.mp3"></audio>
<audio id="winSound" src="https://www.myinstants.com/media/sounds/troll-laugh.mp3"></audio>

<script>

let btn = document.getElementById("btn")
let counter = 0

let trollSound = document.getElementById("trollSound")
let winSound = document.getElementById("winSound")

function moveButton(){

let x = Math.random() * (window.innerWidth - 150)
let y = Math.random() * (window.innerHeight - 100)

btn.style.left = x + "px"
btn.style.top = y + "px"

counter++

document.getElementById("counter").innerText = "Tentativi: " + counter

trollSound.currentTime = 0
trollSound.play()

}

btn.addEventListener("mouseover", moveButton)

btn.addEventListener("click", function(){

document.getElementById("msg").innerText = "Grazie Stronzo 😂"

winSound.play()

})

moveButton()

</script>

</body>
</html>
