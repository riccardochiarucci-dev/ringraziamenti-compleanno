<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulsante</title>

<style>
body{
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:Arial;
}

button{
font-size:30px;
padding:20px 40px;
border-radius:10px;
border:none;
background:red;
color:white;
cursor:pointer;
}

#msg{
margin-top:30px;
font-size:35px;
}
</style>

</head>

<body>

<h1>Premi il pulsante</h1>

<button onclick="cliccato()">Premi qui</button>

<div id="msg"></div>

<script>

function cliccato(){
document.getElementById("msg").innerText="Grazie Stronzo 😂"
}

</script>

</body>
</html>
